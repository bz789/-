name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Gradle
      run: |
        wget https://services.gradle.org/distributions/gradle-8.2-bin.zip -P /tmp
        unzip /tmp/gradle-8.2-bin.zip -d /opt
        export PATH=$PATH:/opt/gradle-8.2/bin
        echo "/opt/gradle-8.2/bin" >> $GITHUB_PATH

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: /opt/gradle-8.2/bin/gradle assembleDebug --no-daemon --stacktrace

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: daojiary-debug
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Build Release APK
      run: /opt/gradle-8.2/bin/gradle assembleRelease --no-daemon --stacktrace

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: daojiary-release
        path: app/build/outputs/apk/release/app-release.apk
